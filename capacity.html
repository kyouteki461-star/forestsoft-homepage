<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/favicon.ico">
    <title>資格情報 - フォレストソフト株式会社</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/login.css"><script src="js/footer-loader.js"></script><script src="js/login.js"></script>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <a href="index.html" class="logo">
                <img src="images/logo-black.png" alt="ForestSoft Logo" onerror="this.style.display='none'">
            </a>
            <ul class="nav" id="nav">
                <li><a href="index.html">ホーム</a></li>
                <li><a href="about.html">企業紹介</a></li>
                <li><a href="company.html">会社情報</a></li>
                <li><a href="news.html">ニュース</a></li>
                <li><a href="business.html">開発事例</a></li>
                <li><a href="partner.html">ビジネスパートナー</a></li>
                <li><a href="recruit.html">採用情報</a></li>
                <li><a href="capacity.html" class="active">資格情報</a></li>
            </ul>
            <div class="menu-toggle" id="menuToggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <!-- Page Header -->
        <div class="page-header">
            <h1>資格情報・ポリシー</h1>
            <p>Certifications & Policies</p>
        </div>

        <div class="content">
            <p style="text-align: center; color: var(--text-light); margin-bottom: 50px; font-size: 16px;">
                各ポリシーの詳細は以下のリンクからご確認いただけます。
            </p>

            <div class="policies-grid">
                <!-- Policy 1: プライバシーポリシー -->
                <div class="policy-card">
                    <a href="policies/privacy.html">
                        <span class="policy-icon">🔒</span>
                        <h3>プライバシーポリシー</h3>
                        <span class="policy-description">個人情報の取り扱いについて</span>
                    </a>
                </div>

                <!-- Policy 2: 情報セキュリティ基本方針 -->
                <div class="policy-card">
                    <a href="policies/security.html">
                        <span class="policy-icon">🛡️</span>
                        <h3>情報セキュリティ基本方針</h3>
                        <span class="policy-description">情報資産の保護と安全管理</span>
                    </a>
                </div>

                <!-- Policy 3: 品質方針 -->
                <div class="policy-card">
                    <a href="policies/quality.html">
                        <span class="policy-icon">🎯</span>
                        <h3>品質方針</h3>
                        <span class="policy-description">高品質なサービスの提供</span>
                    </a>
                </div>

                <!-- Policy 4: 個人情報の取り扱い -->
                <div class="policy-card">
                    <a href="policies/usage.html">
                        <span class="policy-icon">📋</span>
                        <h3>個人情報の取り扱い</h3>
                        <span class="policy-description">利用目的の詳細について</span>
                    </a>
                </div>

                <!-- Policy 5: 環境方針・社会貢献 -->
                <div class="policy-card">
                    <a href="policies/environment.html">
                        <span class="policy-icon">🌱</span>
                        <h3>環境方針・社会貢献</h3>
                        <span class="policy-description">環境保護と社会貢献活動</span>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <div id="footer"></div>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const nav = document.getElementById('nav');

        menuToggle.addEventListener('click', () => {
            nav.classList.toggle('active');
        });

        document.querySelectorAll('.nav a').forEach(link => {
            link.addEventListener('click', () => {
                nav.classList.remove('active');
            });
        });
    </script>
</body>
</html>
